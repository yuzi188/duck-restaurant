<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        #task-input {
            padding: 10px;
            width: 300px;
        }
        #add-task {
            padding: 10px;
            cursor: pointer;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 5px 0;
            padding: 10px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>To-Do List</h1>
    <input id="task-input" type="text" placeholder="Add a new task...">
    <button id="add-task">Add Task</button>
    <ul id="task-list"></ul>

    <script>
        const taskInput = document.getElementById('task-input');
        const addTaskButton = document.getElementById('add-task');
        const taskList = document.getElementById('task-list');

        // Function to save tasks to local storage
        function saveTasks() {
            const tasks = [];
            document.querySelectorAll('.task').forEach(task => {
                tasks.push({text: task.innerText, completed: task.classList.contains('completed')});
            });
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Function to load tasks from local storage
        function loadTasks() {
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            tasks.forEach(task => {
                addTaskToList(task.text, task.completed);
            });
        }

        // Function to add a task to the list
        function addTaskToList(text, completed = false) {
            const li = document.createElement('li');
            li.classList.add('task');
            if (completed) li.classList.add('completed');
            li.innerHTML = `<span>${text}</span><button class='delete'>Delete</button>`;
            taskList.appendChild(li);

            // Add event listener to mark as complete
            li.querySelector('span').onclick = function() {
                li.classList.toggle('completed');
                saveTasks();
            };

            // Add event listener to delete the task
            li.querySelector('.delete').onclick = function() {
                li.remove();
                saveTasks();
            };
        }

        // Add event listener to add task
        addTaskButton.onclick = function() {
            const text = taskInput.value;
            if (text) {
                addTaskToList(text);
                taskInput.value = '';
                saveTasks();
            }
        };

        // Load tasks on page load
        loadTasks();
    </script>
</body>
</html>
